<div class="cpu-container">
  <div class="processor">
    
    <div class="core">
      <div class="core-lines">
        <div class="core-line-h"></div>
        <div class="core-line-v"></div>
      </div>
    </div>

    <div class="dot dot-center-top"></div>
    <div class="dot dot-center-bottom"></div>
    <div class="dot dot-center-left"></div>
    <div class="dot dot-center-right"></div>

    <div class="line-top-group">
      <div class="main-line-v">
        <div class="dot dot-mid-t1"></div>
        <div class="dot dot-mid-t2"></div>
        <div class="dot dot-end-top"></div>
        
        <div class="branch-container branch-top-1">
          <div class="branch-l"><div class="dot dot-branch dot-branch-l"></div></div>
          <div class="branch-r"><div class="dot dot-branch dot-branch-r"></div></div>
        </div>
        <div class="branch-container branch-top-2">
          <div class="branch-l"><div class="dot dot-branch dot-branch-l"></div></div>
          <div class="branch-r"><div class="dot dot-branch dot-branch-r"></div></div>
        </div>
      </div>
    </div>

    <div class="line-bottom-group">
      <div class="main-line-v">
        <div class="dot dot-mid-b1"></div>
        <div class="dot dot-mid-b2"></div>
        <div class="dot dot-end-bottom"></div>
        
        <div class="branch-container branch-bottom-1">
          <div class="branch-l"><div class="dot dot-branch dot-branch-l"></div></div>
          <div class="branch-r"><div class="dot dot-branch dot-branch-r"></div></div>
        </div>
        <div class="branch-container branch-bottom-2">
          <div class="branch-l"><div class="dot dot-branch dot-branch-l"></div></div>
          <div class="branch-r"><div class="dot dot-branch dot-branch-r"></div></div>
        </div>
      </div>
    </div>

    <div class="line-left-group">
      <div class="main-line-h">
        <div class="dot dot-mid-l1"></div>
        <div class="dot dot-mid-l2"></div>
        <div class="dot dot-end-left"></div>
        
        <div class="branch-container branch-left-1">
          <div class="branch-up"><div class="dot dot-branch dot-branch-u"></div></div>
          <div class="branch-down"><div class="dot dot-branch dot-branch-d"></div></div>
        </div>
        <div class="branch-container branch-left-2">
          <div class="branch-up"><div class="dot dot-branch dot-branch-u"></div></div>
          <div class="branch-down"><div class="dot dot-branch dot-branch-d"></div></div>
        </div>
      </div>
    </div>

    <div class="line-right-group">
      <div class="main-line-h">
        <div class="dot dot-mid-r1"></div>
        <div class="dot dot-mid-r2"></div>
        <div class="dot dot-end-right"></div>
        
        <div class="branch-container branch-right-1">
          <div class="branch-up"><div class="dot dot-branch dot-branch-u"></div></div>
          <div class="branch-down"><div class="dot dot-branch dot-branch-d"></div></div>
        </div>
        <div class="branch-container branch-right-2">
          <div class="branch-up"><div class="dot dot-branch dot-branch-u"></div></div>
          <div class="branch-down"><div class="dot dot-branch dot-branch-d"></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<h1 class="logo-title">
  DEVELOPER - CLOUD
</h1>

<div class="contact-section">
  <h2 class="contact-heading">Contáctame</h2>
  <div class="contact-info">
    <label class="contact-item">
      <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M22 4l-10 8L2 4"/>
      </svg>
      <input type="email" class="contact-input" placeholder="tu@correo.com" autocomplete="email">
    </label>
    <label class="contact-item">
      <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
      </svg>
      <input type="text" class="contact-input" placeholder="Teléfono (9 dígitos)" maxlength="9" pattern="[0-9]{9}" inputmode="numeric" autocomplete="tel">
    </label>
  </div>
  <div class="contact-form">
    <textarea class="contact-textarea" placeholder="Escribe tu mensaje aquí..." rows="4"></textarea>
    <button class="contact-submit">Enviar mensaje</button>
  </div>
</div>
